server.port=8089
# ===============================
# DATABASE - POSTGRESQL
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/aodai_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# validate | update | create | create-drop
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true

spring.flyway.url=jdbc:postgresql://localhost:5432/aodai_db
spring.flyway.user=postgres
spring.flyway.password=postgres

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration


# TWILIO - SMS OTP
# ===============================
# L?y t? Twilio Console: https://console.twilio.com/
# Thay b?ng Account SID th?c (b?t ??u b?ng AC)
twilio.account-sid=ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
# Thay b?ng Auth Token th?c
twilio.auth-token=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
# S? ?i?n tho?i Twilio mua (E.164 format, ví d? +14155551234)
twilio.from-number=+1xxxxxxxxxx
# Optional: N?u důng Messaging Service thay vě from-number tr?c ti?p
